<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Badal Tutorial illustration placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b3a5c"/>
      <stop offset="1" stop-color="#0a1f33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0" stop-color="#d4a017" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf7f0"/>
      <stop offset="1" stop-color="#f2ece0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>
  <!-- Bengali calligraphy watermark: শিক্ষা (education) -->
  <text x="512" y="560" font-family="'Noto Sans Bengali', sans-serif" font-size="520" font-weight="800" fill="#d4a017" opacity="0.10" text-anchor="middle">শিক্ষা</text>
  <!-- stylized open book -->
  <g transform="translate(512 620)">
    <path d="M-260 -40 q130 -60 260 0 v200 q-130 -60 -260 0 z" fill="url(#card)" stroke="#d4a017" stroke-width="6"/>
    <path d="M260 -40 q-130 -60 -260 0 v200 q130 -60 260 0 z" fill="url(#card)" stroke="#d4a017" stroke-width="6" opacity="0.9"/>
    <line x1="0" y1="-46" x2="0" y2="156" stroke="#d4a017" stroke-width="5" opacity="0.7"/>
  </g>
  <!-- pencil -->
  <g transform="translate(700 470) rotate(35)">
    <rect x="-14" y="-160" width="28" height="260" rx="6" fill="#d4a017"/>
    <polygon points="-14,-160 14,-160 0,-200" fill="#14233a"/>
    <rect x="-14" y="90" width="28" height="20" fill="#faf7f0"/>
  </g>
  <text x="512" y="930" font-family="'Montserrat', sans-serif" font-size="40" font-weight="800" fill="#faf7f0" text-anchor="middle" letter-spacing="6">BADAL TUTORIAL</text>
</svg>